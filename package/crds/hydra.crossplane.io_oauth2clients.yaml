---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: oauth2clients.hydra.crossplane.io
spec:
  group: hydra.crossplane.io
  names:
    categories:
    - crossplane
    - managed
    - hydra
    kind: OAuth2Client
    listKind: OAuth2ClientList
    plural: oauth2clients
    singular: oauth2client
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .metadata.annotations.crossplane\.io/external-name
      name: EXTERNAL-NAME
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: OAuth2Client is the Schema for Ory Hydra OAuth2 clients.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: OAuth2ClientSpec defines the desired state of an OAuth2Client.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: ForProvider contains the desired state of the OAuth2
                  client in Hydra.
                properties:
                  accessTokenStrategy:
                    description: 'AccessTokenStrategy defines the access token strategy:
                      jwt or opaque.'
                    enum:
                    - jwt
                    - opaque
                    type: string
                  allowedCorsOrigins:
                    description: AllowedCORSOrigins lists the allowed CORS origins
                      for this client.
                    items:
                      type: string
                    type: array
                  audience:
                    description: Audience lists the allowed audience values for the
                      client.
                    items:
                      type: string
                    type: array
                  authorizationCodeGrantAccessTokenLifespan:
                    description: |-
                      AuthorizationCodeGrantAccessTokenLifespan controls the access token lifespan
                      for the authorization code grant. Uses Go duration format (e.g., "30m", "1h").
                    type: string
                  authorizationCodeGrantIdTokenLifespan:
                    description: |-
                      AuthorizationCodeGrantIDTokenLifespan controls the ID token lifespan
                      for the authorization code grant.
                    type: string
                  authorizationCodeGrantRefreshTokenLifespan:
                    description: |-
                      AuthorizationCodeGrantRefreshTokenLifespan controls the refresh token lifespan
                      for the authorization code grant.
                    type: string
                  backchannelLogoutSessionRequired:
                    description: BackchannelLogoutSessionRequired indicates whether
                      the RP requires a sid claim in the logout token.
                    type: boolean
                  backchannelLogoutUri:
                    description: BackchannelLogoutURI is the URL for backchannel logout
                      notification.
                    type: string
                  clientCredentialsGrantAccessTokenLifespan:
                    description: |-
                      ClientCredentialsGrantAccessTokenLifespan controls the access token lifespan
                      for the client credentials grant.
                    type: string
                  clientId:
                    description: ClientID is the OAuth 2.0 Client ID. If not set,
                      Hydra will generate a UUID.
                    type: string
                  clientName:
                    description: ClientName is the human-readable name of the client
                      shown during authorization.
                    type: string
                  clientSecret:
                    description: |-
                      ClientSecret is the OAuth 2.0 Client Secret. If not set, Hydra will generate one.
                      The secret is only returned by Hydra on creation.
                    type: string
                  clientUri:
                    description: ClientURI is a URL of a web page providing information
                      about the client.
                    type: string
                  contacts:
                    description: Contacts lists email addresses of people responsible
                      for this client.
                    items:
                      type: string
                    type: array
                  frontchannelLogoutSessionRequired:
                    description: FrontchannelLogoutSessionRequired indicates whether
                      the RP requires a sid claim.
                    type: boolean
                  frontchannelLogoutUri:
                    description: FrontchannelLogoutURI is the URL for frontchannel
                      logout.
                    type: string
                  grantTypes:
                    description: GrantTypes lists the OAuth 2.0 grant types the client
                      may use.
                    items:
                      type: string
                    type: array
                  idTokenSignedResponseAlg:
                    description: IDTokenSignedResponseAlg is the algorithm used to
                      sign ID tokens.
                    type: string
                  implicitGrantAccessTokenLifespan:
                    description: |-
                      ImplicitGrantAccessTokenLifespan controls the access token lifespan
                      for the implicit grant.
                    type: string
                  implicitGrantIdTokenLifespan:
                    description: |-
                      ImplicitGrantIDTokenLifespan controls the ID token lifespan
                      for the implicit grant.
                    type: string
                  jwks:
                    description: Jwks is the client's JSON Web Key Set document value.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  jwksUri:
                    description: JwksURI is the URL for the client's JSON Web Key
                      Set.
                    type: string
                  jwtBearerGrantAccessTokenLifespan:
                    description: |-
                      JwtBearerGrantAccessTokenLifespan controls the access token lifespan
                      for the JWT bearer grant.
                    type: string
                  logoUri:
                    description: LogoURI is a URL pointing to the client's logo.
                    type: string
                  metadata:
                    description: Metadata is arbitrary metadata associated with the
                      client.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  owner:
                    description: Owner identifies the owner of the OAuth 2.0 client.
                    type: string
                  policyUri:
                    description: PolicyURI points to a human-readable privacy policy
                      for the client.
                    type: string
                  postLogoutRedirectUris:
                    description: PostLogoutRedirectURIs lists the URLs the client
                      may redirect to after logout.
                    items:
                      type: string
                    type: array
                  redirectUris:
                    description: |-
                      RedirectURIs lists the allowed redirect URIs for the client.
                      Must match exactly (no wildcard patterns).
                    items:
                      type: string
                    type: array
                  refreshTokenGrantAccessTokenLifespan:
                    description: |-
                      RefreshTokenGrantAccessTokenLifespan controls the access token lifespan
                      for the refresh token grant.
                    type: string
                  refreshTokenGrantIdTokenLifespan:
                    description: |-
                      RefreshTokenGrantIDTokenLifespan controls the ID token lifespan
                      for the refresh token grant.
                    type: string
                  refreshTokenGrantRefreshTokenLifespan:
                    description: |-
                      RefreshTokenGrantRefreshTokenLifespan controls the refresh token lifespan
                      for the refresh token grant.
                    type: string
                  requestObjectSigningAlg:
                    description: RequestObjectSigningAlg is the algorithm used to
                      sign request objects.
                    type: string
                  requestUris:
                    description: RequestURIs lists pre-registered request_uri values
                      for the client.
                    items:
                      type: string
                    type: array
                  responseTypes:
                    description: ResponseTypes lists the OAuth 2.0 response types
                      the client may use.
                    items:
                      type: string
                    type: array
                  scope:
                    description: Scope is a space-delimited list of scope values the
                      client can request.
                    type: string
                  sectorIdentifierUri:
                    description: SectorIdentifierURI is a URL using the https scheme
                      to derive pairwise subject identifiers.
                    type: string
                  skipConsent:
                    description: SkipConsent skips the consent screen for this client
                      if set to true.
                    type: boolean
                  skipLogoutConsent:
                    description: SkipLogoutConsent skips the logout consent screen
                      for this client.
                    type: boolean
                  subjectType:
                    description: SubjectType defines the subject type requested for
                      responses to this client.
                    enum:
                    - pairwise
                    - public
                    type: string
                  tokenEndpointAuthMethod:
                    description: |-
                      TokenEndpointAuthMethod is the authentication method for the token endpoint.
                      One of: client_secret_basic, client_secret_post, private_key_jwt, none.
                    enum:
                    - client_secret_basic
                    - client_secret_post
                    - private_key_jwt
                    - none
                    type: string
                  tokenEndpointAuthSigningAlg:
                    description: TokenEndpointAuthSigningAlg is the signing algorithm
                      for token endpoint authentication.
                    type: string
                  tosUri:
                    description: TosURI points to the client's terms of service.
                    type: string
                  userinfoSignedResponseAlg:
                    description: UserinfoSignedResponseAlg is the algorithm used to
                      sign userinfo responses.
                    type: string
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS A BETA FIELD. It is on by default but can be opted out
                  through a Crossplane feature flag.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  This field is planned to replace the DeletionPolicy field in a future
                  release. Currently, both could be set independently and non-default
                  values would be honored if the feature flag is enabled. If both are
                  custom, the DeletionPolicy field will be ignored.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                  namespace:
                    description: Namespace of the secret.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - forProvider
            type: object
          status:
            description: OAuth2ClientStatus defines the observed state of an OAuth2Client.
            properties:
              atProvider:
                description: AtProvider contains the observed state of the OAuth2
                  client in Hydra.
                properties:
                  clientId:
                    description: ClientID is the resolved client ID (especially relevant
                      when auto-generated).
                    type: string
                  createdAt:
                    description: CreatedAt is the time at which the client was created.
                    type: string
                  registrationAccessToken:
                    description: RegistrationAccessToken is the access token for the
                      dynamic client registration endpoint.
                    type: string
                  registrationClientUri:
                    description: RegistrationClientURI is the URL of the dynamic client
                      registration endpoint.
                    type: string
                  updatedAt:
                    description: UpdatedAt is the time at which the client was last
                      updated.
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    observedGeneration:
                      description: |-
                        ObservedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      type: integer
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the latest metadata.generation
                  which resulted in either a ready state, or stalled due to error
                  it can not recover from without human intervention.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
